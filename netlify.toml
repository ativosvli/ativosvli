[build]
  publish = "public"
  functions = "netlify/functions"
  command = "npm ci"

[functions]
  node_bundler = "nft"
  included_files = ["scripts/**/*"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
