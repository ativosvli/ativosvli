[build]
  publish = "public"
  functions = "netlify/functions"
  command = "npm ci"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@libsql/client", "better-sqlite3", "bcryptjs", "express-session"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
