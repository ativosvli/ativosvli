[build]
  publish = "public"
  functions = "netlify/functions"
  command = "npm ci"

[functions]
  node_bundler = "esbuild"
  included_files = ["app.js", "database.js", "events.js", "routes/**/*", "middleware/**/*"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
